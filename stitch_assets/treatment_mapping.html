<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Treatment Management | Ascender Medical</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../styles/globals.css">
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#258cf4",
          },
        },
      },
    }
  </script>
</head>

<body
  class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex selection:bg-primary/30">
  <!-- Sidebar Navigation -->
  <aside
    class="w-64 border-r border-slate-200 dark:border-slate-800 h-screen flex flex-col bg-white/50 dark:bg-background-dark/50 backdrop-blur-md">
    <div class="p-8">
      <div class="flex items-center gap-3">
        <div
          class="size-10 bg-primary rounded-xl flex items-center justify-center text-white shadow-lg shadow-primary/20">
          <span class="material-symbols-outlined font-bold">insights</span>
        </div>
        <h1 class="text-xl font-black tracking-tighter uppercase">Ascender</h1>
      </div>
    </div>
    <nav class="flex-1 px-4 space-y-1">
      <a class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-100 dark:hover:bg-white/5 rounded-lg transition-all"
        href="admin_dashboard.html">
        <span class="material-symbols-outlined">dashboard</span>
        <span class="font-bold text-xs uppercase tracking-widest">Dashboard</span>
      </a>
      <a class="flex items-center gap-3 px-4 py-3 bg-primary/10 text-primary rounded-lg border border-primary/10"
        href="treatment_mapping.html">
        <span class="material-symbols-outlined">medical_services</span>
        <span class="font-bold text-xs uppercase tracking-widest">Treatments</span>
      </a>
    </nav>
    <div class="p-6 border-t border-slate-200 dark:border-slate-800">
      <div class="flex items-center gap-3 p-3 rounded-xl bg-slate-50 dark:bg-white/5">
        <div class="size-10 rounded-lg bg-primary/10 flex items-center justify-center">
          <span class="material-symbols-outlined text-primary">person</span>
        </div>
        <div>
          <p class="text-sm font-bold">Admin</p>
          <p class="text-[10px] text-slate-400 font-black uppercase">Super Admin</p>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col h-screen overflow-hidden">
    <header
      class="h-20 border-b border-slate-200 dark:border-slate-800 px-8 flex items-center justify-between bg-white/30 dark:bg-background-dark/30 backdrop-blur-md">
      <div class="flex flex-col">
        <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest mb-1">Treatment Details</p>
        <h2 class="text-2xl font-black tracking-tight">Botox Cosmetic</h2>
      </div>
      <div class="flex items-center gap-4">
        <button class="btn btn-secondary px-6">Discard</button>
        <button class="btn btn-primary px-8">
          <span class="material-symbols-outlined">save</span>
          Save Changes
        </button>
      </div>
    </header>

    <div class="flex-1 overflow-y-auto p-8">
      <div class="max-w-6xl mx-auto grid grid-cols-12 gap-8">
        <!-- Left Column -->
        <div class="col-span-12 lg:col-span-5 space-y-8">
          <section class="card p-8">
            <h3 class="text-sm font-black uppercase text-primary tracking-widest mb-6 flex items-center gap-2">
              <span class="material-symbols-outlined">info</span>
              General Info
            </h3>
            <div class="space-y-6">
              <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Treatment
                  Name</label>
                <input
                  class="w-full bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-slate-800 rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-primary transition-all"
                  type="text" value="Botox Cosmetic Treatment" />
              </div>
              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label
                    class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Duration</label>
                  <input
                    class="w-full bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-slate-800 rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-primary transition-all"
                    type="text" value="45 min" />
                </div>
                <div>
                  <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Base
                    Price</label>
                  <input
                    class="w-full bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-slate-800 rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-primary transition-all"
                    type="text" value="$350.00" />
                </div>
              </div>
            </div>
          </section>
        </div>

        <!-- Right Column -->
        <div class="col-span-12 lg:col-span-7">
          <section class="card h-full flex flex-col overflow-hidden">
            <div class="p-8 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between">
              <h3 class="text-sm font-black uppercase text-primary tracking-widest flex items-center gap-2">
                <span class="material-symbols-outlined">verified_user</span>
                Qualified Providers
              </h3>
              <span class="bg-primary/10 text-primary text-[10px] font-black px-3 py-1 rounded-full uppercase">4
                Assigned</span>
            </div>
            <div class="flex-1 overflow-y-auto p-4 space-y-2">
              <!-- Provider Item -->
              <div
                class="flex items-center justify-between p-4 bg-slate-50/50 dark:bg-white/5 border border-slate-100 dark:border-slate-800 rounded-xl hover:border-primary/50 transition-all">
                <div class="flex items-center gap-4">
                  <div class="size-12 rounded-full bg-primary/10 flex items-center justify-center text-primary">
                    <span class="material-symbols-outlined">person</span>
                  </div>
                  <div>
                    <p class="font-bold">Dr. Sarah Smith</p>
                    <p class="text-[10px] text-slate-400 font-black uppercase">Aesthetic Physician</p>
                  </div>
                </div>
                <input checked class="accent-primary size-5" type="checkbox" />
              </div>
              <!-- More providers... -->
            </div>
            <div class="p-6 border-t border-slate-200 dark:border-slate-800">
              <button class="w-full btn btn-secondary py-3">
                <span class="material-symbols-outlined">person_add</span>
                Add Provider
              </button>
            </div>
          </section>
        </div>
      </div>
    </div>
  </main>
  <script src="../js/app.js"></script>
</body>

</html>
