<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Provider Schedule Management</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../styles/globals.css">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#258cf4",
                    },
                },
            },
        }
    </script>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex selection:bg-primary/30">
    <!-- Sidebar -->
    <aside
        class="w-64 border-r border-slate-200 dark:border-slate-800 flex flex-col bg-white dark:bg-background-dark shrink-0">
        <div class="p-6 flex items-center gap-3">
            <div
                class="size-10 bg-primary rounded-xl flex items-center justify-center text-white shadow-lg shadow-primary/20">
                <span class="material-symbols-outlined font-bold">calendar_month</span>
            </div>
            <h1 class="text-xl font-black tracking-tighter uppercase">Ascender</h1>
        </div>
        <nav class="flex-1 px-4 space-y-1 mt-4">
            <a class="flex items-center gap-3 px-3 py-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-white/5 rounded-lg transition-all"
                href="admin_dashboard.html">
                <span class="material-symbols-outlined">dashboard</span>
                <span class="text-sm font-bold">Dashboard</span>
            </a>
            <a class="flex items-center gap-3 px-3 py-2 bg-primary/10 text-primary rounded-lg border border-primary/10"
                href="provider_schedule.html">
                <span class="material-symbols-outlined">event_note</span>
                <span class="text-sm font-bold">Schedules</span>
            </a>
        </nav>
        <!-- User Profile -->
        <div class="p-4 border-t border-slate-200 dark:border-slate-800">
            <div class="flex items-center gap-3 p-3 rounded-xl bg-slate-50 dark:bg-white/5">
                <div class="size-10 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
                    <span class="material-symbols-outlined">person</span>
                </div>
                <div>
                    <p class="text-sm font-bold">Admin</p>
                    <p class="text-[10px] text-slate-400 font-black uppercase">Super Admin</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header
            class="h-20 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-8 bg-white/30 dark:bg-background-dark/30 backdrop-blur-md">
            <div>
                <nav
                    class="flex items-center gap-2 text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">
                    <span>Schedules</span>
                    <span class="material-symbols-outlined text-xs">chevron_right</span>
                    <select id="providerSelect"
                        class="bg-transparent text-primary font-bold outline-none cursor-pointer hover:underline appearance-none">
                        <option value="">Loading Providers...</option>
                    </select>
                </nav>
                <h2 class="text-2xl font-black tracking-tight">Edit Schedule</h2>
            </div>
            <div class="flex items-center gap-4">
                <button class="btn btn-secondary px-6" onclick="loadSelectedProviderSchedule()">Discard</button>
                <button class="btn btn-primary px-8" id="saveScheduleBtn">
                    <span class="material-symbols-outlined">save</span>
                    Save Changes
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8 space-y-8">
            <div class="max-w-5xl mx-auto grid grid-cols-12 gap-8">
                <!-- Weekly Hours -->
                <section class="col-span-12 lg:col-span-7 card p-8">
                    <h3 class="text-sm font-black uppercase text-primary tracking-widest mb-8 flex items-center gap-2">
                        <span class="material-symbols-outlined">schedule</span>
                        Weekly Hours
                    </h3>
                    <div class="space-y-4" id="scheduleDaysContainer">
                        <!-- Days will be rendered dynamically -->
                        <div class="text-slate-400 text-sm italic text-center py-4">Please select a provider to view
                            schedule.</div>
                    </div>
                </section>

                <!-- Blocked Dates -->
                <section class="col-span-12 lg:col-span-5 card p-8">
                    <div class="flex items-center justify-between mb-8">
                        <h3 class="text-sm font-black uppercase text-primary tracking-widest flex items-center gap-2">
                            <span class="material-symbols-outlined">event_busy</span>
                            Blocked Dates
                        </h3>
                        <button class="text-primary text-xs font-black uppercase">Add Block</button>
                    </div>
                    <div class="space-y-3">
                        <div
                            class="p-4 bg-slate-50 dark:bg-white/5 border border-slate-100 dark:border-slate-800 rounded-xl flex items-center justify-between group">
                            <div class="flex items-center gap-4">
                                <div
                                    class="size-10 rounded-lg bg-red-500/10 flex items-center justify-center text-red-500">
                                    <span class="material-symbols-outlined">travel</span>
                                </div>
                                <div>
                                    <p class="font-bold text-sm">Annual Leave</p>
                                    <p class="text-[10px] text-slate-400 font-black uppercase">Mar 15 - Mar 22</p>
                                </div>
                            </div>
                            <button class="text-slate-400 hover:text-red-500 transition-colors">
                                <span class="material-symbols-outlined">delete</span>
                            </button>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </main>
    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/admin-auth.js"></script>
    <script>
        const providerSelect = document.getElementById('providerSelect');
        const scheduleDaysContainer = document.getElementById('scheduleDaysContainer');
        const saveScheduleBtn = document.getElementById('saveScheduleBtn');

        const DAYS_OF_WEEK = [
            { id: 1, name: 'Monday' },
            { id: 2, name: 'Tuesday' },
            { id: 3, name: 'Wednesday' },
            { id: 4, name: 'Thursday' },
            { id: 5, name: 'Friday' },
            { id: 6, name: 'Saturday' },
            { id: 0, name: 'Sunday' }
        ];

        let currentProviders = [];
        let currentSchedules = [];

        document.addEventListener('DOMContentLoaded', async () => {
            const clinicId = window.adminUser?.clinic_id || 1;
            try {
                const res = await smartbookApi.getAdminProviders(clinicId);
                if (res.success) {
                    currentProviders = res.data;
                    renderProviderDropdown();
                }
            } catch (err) {
                console.error("Failed to load providers", err);
            }
        });

        function renderProviderDropdown() {
            if (currentProviders.length === 0) {
                providerSelect.innerHTML = '<option value="">No Providers Found</option>';
                return;
            }

            providerSelect.innerHTML = currentProviders.map(p =>
                `<option value="${p.id}">${p.full_name} (${p.specialization})</option>`
            ).join('');

            // Explicitly set the value to the first mapped option to prevent empty selection visual bug
            providerSelect.value = currentProviders[0].id;

            loadSelectedProviderSchedule();
        }

        providerSelect.addEventListener('change', loadSelectedProviderSchedule);

        async function loadSelectedProviderSchedule() {
            const providerId = providerSelect.value;
            if (!providerId) return;

            scheduleDaysContainer.innerHTML = '<div class="text-center py-4 text-slate-500">Loading schedule...</div>';

            try {
                const res = await smartbookApi.getProviderSchedule(providerId);
                if (res.success) {
                    currentSchedules = res.data;
                    renderScheduleForm();
                } else {
                    scheduleDaysContainer.innerHTML = `<div class="text-center py-4 text-red-500">Error loading schedule</div>`;
                }
            } catch (err) {
                console.error("Failed to load schedule", err);
                scheduleDaysContainer.innerHTML = `<div class="text-center py-4 text-red-500">Connection error</div>`;
            }
        }

        function renderScheduleForm() {
            scheduleDaysContainer.innerHTML = '';

            DAYS_OF_WEEK.forEach(dayInfo => {
                // Find existing schedule for this day
                const existing = currentSchedules.find(s => s.day_of_week === dayInfo.id);
                const isEnabled = !!existing;
                const startTime = existing ? existing.start_time.substring(0, 5) : '09:00';
                const endTime = existing ? existing.end_time.substring(0, 5) : '17:00';

                const row = document.createElement('div');
                row.className = 'grid grid-cols-12 items-center gap-4 py-4 border-b border-slate-100 dark:border-slate-800/50 last:border-0';
                row.innerHTML = `
                    <div class="col-span-4 flex items-center gap-3">
                        <input type="checkbox" class="accent-primary size-5 day-checkbox" data-day="${dayInfo.id}" ${isEnabled ? 'checked' : ''} />
                        <span class="font-bold">${dayInfo.name}</span>
                    </div>
                    <div class="col-span-8 flex items-center gap-4 transition-opacity ${isEnabled ? '' : 'opacity-50 pointer-events-none'}" id="time-inputs-${dayInfo.id}">
                        <input type="time" class="w-full bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-slate-800 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-primary start-time" value="${startTime}" data-day="${dayInfo.id}" />
                        <span class="text-slate-400 text-xs font-bold uppercase">to</span>
                        <input type="time" class="w-full bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-slate-800 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-primary end-time" value="${endTime}" data-day="${dayInfo.id}" />
                    </div>
                `;

                // Add event listener to toggle inputs state when checking/unchecking
                const checkbox = row.querySelector('.day-checkbox');
                const timeInputs = row.querySelector(`#time-inputs-${dayInfo.id}`);
                checkbox.addEventListener('change', (e) => {
                    if (e.target.checked) {
                        timeInputs.classList.remove('opacity-50', 'pointer-events-none');
                    } else {
                        timeInputs.classList.add('opacity-50', 'pointer-events-none');
                    }
                });

                scheduleDaysContainer.appendChild(row);
            });
        }

        saveScheduleBtn.addEventListener('click', async () => {
            const providerId = providerSelect.value;
            if (!providerId) return;

            const newSchedules = [];
            const checkboxes = document.querySelectorAll('.day-checkbox');

            checkboxes.forEach(cb => {
                if (cb.checked) {
                    const dayId = cb.getAttribute('data-day');
                    const startTimeInput = document.querySelector(`.start-time[data-day="${dayId}"]`);
                    const endTimeInput = document.querySelector(`.end-time[data-day="${dayId}"]`);

                    newSchedules.push({
                        dayOfWeek: parseInt(dayId),
                        startTime: startTimeInput.value,
                        endTime: endTimeInput.value
                    });
                }
            });

            saveScheduleBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> Saving...';
            saveScheduleBtn.disabled = true;

            try {
                const res = await smartbookApi.updateProviderSchedule(providerId, newSchedules);
                if (res.success) {
                    alert('Schedule saved successfully!');
                    loadSelectedProviderSchedule(); // Reload
                } else {
                    alert('Failed to save schedule: ' + res.error);
                }
            } catch (err) {
                console.error("Save error", err);
                alert('Connection error while saving.');
            } finally {
                saveScheduleBtn.innerHTML = '<span class="material-symbols-outlined">save</span> Save Changes';
                saveScheduleBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
