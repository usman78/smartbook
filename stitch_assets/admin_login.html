<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | SmartBook</title>
    <link rel="stylesheet" href="/styles/globals.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top left, #258cf4 0%, #1e70c3 100%);
            overflow: hidden;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            animation: fadeIn 0.6s ease-out;
            position: relative;
            z-index: 10;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-area {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-text {
            font-size: 2rem;
            color: white;
            font-weight: 900;
            letter-spacing: -1px;
        }

        .logo-dot {
            color: var(--accent-mint);
        }

        .error-message {
            background: rgba(236, 91, 19, 0.1);
            border: 1px solid var(--accent-orange);
            color: var(--accent-orange);
            padding: 0.75rem;
            border-radius: var(--radius-md);
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            text-align: center;
        }

        .footer-links {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.7);
        }

        /* Decorative circles */
        .decoration {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 1;
        }

        .circle-1 {
            width: 300px;
            height: 300px;
            background: var(--accent-purple);
            top: -100px;
            right: -100px;
            opacity: 0.4;
        }

        .circle-2 {
            width: 400px;
            height: 400px;
            background: var(--accent-mint);
            bottom: -150px;
            left: -150px;
            opacity: 0.3;
        }
    </style>
</head>

<body>
    <div class="decoration circle-1"></div>
    <div class="decoration circle-2"></div>

    <div class="glass-panel login-card">
        <div class="logo-area">
            <h1 class="logo-text">SmartBook<span class="logo-dot">.</span></h1>
            <p style="color: rgba(255,255,255,0.6); font-size: 0.9rem; margin-top: 0.5rem;">Clinical Management Portal
            </p>
        </div>

        <div id="errorBox" class="error-message hidden"></div>

        <form id="loginForm">
            <div class="input-group" style="margin-bottom: 1.5rem;">
                <label style="color: white; font-weight: 600; font-size: 0.85rem;">EMAIL ADDRESS</label>
                <input type="email" id="email" placeholder="admin@example.com" required
                    style="background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); color: white;">
            </div>

            <div class="input-group" style="margin-bottom: 2rem;">
                <label style="color: white; font-weight: 600; font-size: 0.85rem;">PASSWORD</label>
                <input type="password" id="password" placeholder="••••••••" required
                    style="background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); color: white;">
            </div>

            <button type="submit" class="btn btn-primary"
                style="width: 100%; padding: 1rem; background: white; color: var(--primary);">
                Sign In to Dashboard
            </button>
        </form>

        <div class="footer-links">
            &copy; 2026 SmartBook Health. All rights reserved.
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script>
        const loginForm = document.getElementById('loginForm');
        const errorBox = document.getElementById('errorBox');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorBox.classList.add('hidden');

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const result = await api.login(email, password);

                if (result.success) {
                    window.location.href = 'admin_dashboard.html';
                } else {
                    errorBox.textContent = result.error || 'Invalid email or password';
                    errorBox.classList.remove('hidden');
                }
            } catch (err) {
                errorBox.textContent = 'Connection error. Is the server running?';
                errorBox.classList.remove('hidden');
            }
        });

        // Pre-fill for testing if requested
        if (new URLSearchParams(window.location.search).has('test')) {
            document.getElementById('email').value = 'admin@elite.com';
            document.getElementById('password').value = 'Pass123!';
        }
    </script>
</body>

</html>
