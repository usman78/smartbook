<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>SmartBook | Insurance Verification Queue</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/styles/globals.css">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#258cf4",
                    },
                },
            },
        }
    </script>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
    <div class="flex h-screen overflow-hidden selection:bg-primary/30">
        <!-- Sidebar -->
        <aside
            class="w-64 flex-shrink-0 border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark flex flex-col justify-between py-6">
            <div class="flex flex-col gap-8">
                <div class="px-6 flex items-center gap-3">
                    <div
                        class="bg-primary size-10 rounded-lg flex items-center justify-center text-white shadow-lg shadow-primary/20">
                        <span class="material-symbols-outlined">menu_book</span>
                    </div>
                    <h1 class="text-xl font-black tracking-tight uppercase">SmartBook</h1>
                </div>

                <nav class="flex flex-col gap-1 px-3">
                    <a class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-slate-500 hover:bg-slate-50 dark:hover:bg-white/5 transition-colors"
                        href="admin_dashboard.html">
                        <span class="material-symbols-outlined">dashboard</span>
                        <span class="text-sm font-medium">Dashboard</span>
                    </a>
                    <a class="flex items-center gap-3 px-4 py-2.5 rounded-lg bg-primary/10 text-primary border border-primary/10"
                        href="#">
                        <span class="material-symbols-outlined">verified_user</span>
                        <span class="text-sm font-bold">Insurance Queue</span>
                    </a>
                </nav>
            </div>

            <div class="px-6">
                <button onclick="logout()" class="btn btn-secondary w-full py-3">
                    <span class="material-symbols-outlined">logout</span>
                    Logout
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 flex flex-col overflow-y-auto">
            <header
                class="h-20 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-8 bg-white/50 dark:bg-background-dark/50 backdrop-blur-md sticky top-0 z-10">
                <div class="flex flex-col">
                    <h2 class="text-2xl font-black tracking-tight">Insurance Queue</h2>
                    <p id="pendingCount" class="text-[10px] text-slate-400 uppercase font-black tracking-widest">
                        Loading...</p>
                </div>
                <div class="flex items-center gap-4">
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-2 text-slate-400">search</span>
                        <input
                            class="bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-slate-800 rounded-full pl-10 pr-4 py-2 text-sm outline-none focus:ring-2 focus:ring-primary w-64"
                            placeholder="Search patients..." type="text" />
                    </div>
                </div>
            </header>

            <div class="p-8 max-w-7xl w-full mx-auto space-y-8">
                <section id="criticalSection">
                    <h3 class="text-sm font-black uppercase text-red-500 tracking-widest mb-4 flex items-center gap-2">
                        <span class="material-symbols-outlined">warning</span>
                        Critical - Arriving Today
                    </h3>
                    <div id="criticalGrid" class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <!-- Critical items will be rendered here -->
                    </div>
                </section>

                <section>
                    <h3 class="text-sm font-black uppercase text-slate-400 tracking-widest mb-4">Upcoming Appointments
                    </h3>
                    <div class="card overflow-hidden">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 dark:bg-white/5">
                                <tr>
                                    <th
                                        class="px-6 py-4 text-[10px] font-black uppercase tracking-widest text-slate-400">
                                        Patient</th>
                                    <th
                                        class="px-6 py-4 text-[10px] font-black uppercase tracking-widest text-slate-400">
                                        Date & Time</th>
                                    <th
                                        class="px-6 py-4 text-[10px] font-black uppercase tracking-widest text-slate-400 text-right">
                                        Actions</th>
                                </tr>
                            </thead>
                            <tbody id="standardQueueBody" class="divide-y divide-slate-200 dark:divide-slate-800">
                                <!-- Standard items will be rendered here -->
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
    <script>
        // Security Check
        const token = localStorage.getItem('adminToken');
        if (!token) {
            window.location.href = 'admin_login.html';
        }

        const adminUser = JSON.parse(localStorage.getItem('adminUser') || '{}');

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await api.getInsuranceQueue('pending');
                if (response.success) {
                    renderQueue(response.data);
                    document.getElementById('pendingCount').textContent = `${response.data.length} Pending Verifications`;
                } else {
                    console.error('API Error:', response.error);
                    document.getElementById('standardQueueBody').innerHTML = `<tr><td colspan="3" class="px-6 py-8 text-center text-red-500">Error: ${response.error || 'Unknown error'}</td></tr>`;
                }
            } catch (error) {
                console.error('Failed to fetch insurance queue:', error);
                document.getElementById('standardQueueBody').innerHTML = '<tr><td colspan="3" class="px-6 py-8 text-center text-slate-500">Failed to load data.</td></tr>';
            }
        });

        function renderQueue(items) {
            const criticalGrid = document.getElementById('criticalGrid');
            const tableBody = document.getElementById('standardQueueBody');

            criticalGrid.innerHTML = '';
            tableBody.innerHTML = '';

            const criticalItems = items.filter(i => i.urgency === 'critical');
            const standardItems = items.filter(i => i.urgency !== 'critical');

            if (criticalItems.length === 0) {
                document.getElementById('criticalSection').classList.add('hidden');
            } else {
                document.getElementById('criticalSection').classList.remove('hidden');
            }

            if (items.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="3" class="px-6 py-8 text-center text-slate-500">No pending verifications found.</td></tr>';
                return;
            }

            criticalItems.forEach(item => {
                const div = document.createElement('div');
                div.className = 'card p-6 flex flex-col md:flex-row gap-6 hover:border-primary/50 transition-all group';
                div.innerHTML = `
            <div class="flex-1">
                <p class="text-[10px] font-black uppercase text-red-500 mb-1">Critical Urgency</p>
                <h4 class="text-2xl font-black mb-1">${item.patient_name}</h4>
                <p class="text-slate-500 text-sm font-medium">${item.type_name}</p>
                <p class="text-[10px] text-slate-400 mt-2">Appt: ${new Date(item.scheduled_datetime).toLocaleString()}</p>
                <div class="flex gap-3 mt-6">
                    <button class="btn btn-primary px-5 py-2.5 text-sm" onclick="verify('${item.id}')">Verify Now</button>
                    <button class="btn btn-secondary px-5 py-2.5 text-sm">Call Patient</button>
                </div>
            </div>
            <div class="w-32 h-32 rounded-lg bg-primary/5 border border-slate-200 dark:border-slate-800 shrink-0 flex items-center justify-center">
                <span class="material-symbols-outlined text-primary text-4xl">person</span>
            </div>
        `;
                criticalGrid.appendChild(div);
            });

            standardItems.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-slate-50 dark:hover:bg-white/5 transition-colors';
                tr.innerHTML = `
            <td class="px-6 py-4">
                <p class="font-bold">${item.patient_name}</p>
                <p class="text-[10px] text-slate-400 uppercase font-black">ID: ${item.id.substring(0, 8)}</p>
            </td>
            <td class="px-6 py-4">
                <p class="font-bold">${new Date(item.scheduled_datetime).toLocaleDateString()}</p>
                <p class="text-[10px] text-slate-400 uppercase font-black">${new Date(item.scheduled_datetime).toLocaleTimeString()}</p>
            </td>
            <td class="px-6 py-4 text-right">
                <button class="btn btn-primary py-1.5 px-4 text-xs" onclick="verify('${item.id}')">Verify</button>
            </td>
        `;
                tableBody.appendChild(tr);
            });
        }

        async function verify(appointmentId) {
            alert('Opening verification for appointment ' + appointmentId);
        }

        function logout() {
            localStorage.removeItem('adminToken');
            localStorage.removeItem('adminUser');
            window.location.href = 'admin_login.html';
        }
    </script>
</body>

</html>
