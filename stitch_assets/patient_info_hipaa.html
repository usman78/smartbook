<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>SmartBook - Patient Information & HIPAA Consent</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../styles/globals.css">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#258cf4",
                    },
                },
            },
        }
    </script>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
    <header class="bg-primary px-6 py-4 flex items-center justify-between shadow-lg z-10">
        <div class="flex items-center gap-3">
            <div class="bg-white/20 p-2 rounded-lg">
                <span class="material-symbols-outlined text-white text-2xl">auto_stories</span>
            </div>
            <h1 class="text-white text-xl font-bold tracking-tight">SmartBook</h1>
        </div>
        <div class="flex items-center gap-4">
            <span class="text-white/80 text-sm font-medium">Step 5 of 6</span>
            <div class="flex gap-1">
                <div class="h-2 w-5 bg-white rounded-full"></div>
                <div class="h-2 w-5 bg-white rounded-full"></div>
                <div class="h-2 w-5 bg-white rounded-full"></div>
                <div class="h-2 w-5 bg-white rounded-full"></div>
                <div class="h-2 w-5 bg-white rounded-full"></div>
                <div class="h-2 w-5 bg-white/20 rounded-full"></div>
            </div>
        </div>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center p-4 md:p-8 selection:bg-primary/30">
        <div
            class="w-full max-w-2xl bg-surface-white dark:bg-surface-dark border border-slate-200 dark:border-slate-800 rounded-xl shadow-2xl overflow-hidden">
            <div class="p-8 border-b border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-white/5">
                <h2 class="text-2xl md:text-3xl font-bold mb-2">Patient Information</h2>
                <p class="text-slate-500 text-sm md:text-base">Please provide your details to complete the scheduling
                    process.</p>
            </div>

            <form class="p-8 space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-sm font-medium text-slate-500">Full Name</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-3 top-3 text-slate-400">person</span>
                            <input id="fullName"
                                class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-background-dark border border-slate-200 dark:border-slate-800 rounded-lg focus:ring-2 focus:ring-primary outline-none transition-all"
                                placeholder="John Doe" type="text" required />
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-medium text-slate-500">Date of Birth</label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-3 top-3 text-slate-400">calendar_month</span>
                            <input id="dob"
                                class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-background-dark border border-slate-200 dark:border-slate-800 rounded-lg focus:ring-2 focus:ring-primary outline-none transition-all"
                                placeholder="YYYY-MM-DD" type="date" required />
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-medium text-slate-500">Email Address</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-3 top-3 text-slate-400">mail</span>
                            <input id="email"
                                class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-background-dark border border-slate-200 dark:border-slate-800 rounded-lg focus:ring-2 focus:ring-primary outline-none transition-all"
                                placeholder="john@example.com" type="email" required />
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-medium text-slate-500">Phone Number</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-3 top-3 text-slate-400">phone</span>
                            <input id="phone"
                                class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-background-dark border border-slate-200 dark:border-slate-800 rounded-lg focus:ring-2 focus:ring-primary outline-none transition-all"
                                placeholder="(555) 000-0000" type="tel" required pattern="^\(\d{3}\) \d{3}-\d{4}$"
                                title="Format: (555) 000-0000" maxlength="14" />
                        </div>
                    </div>
                </div>

                <!-- Phone Validation Feedback -->
                <div id="phoneValidationMsg" class="hidden text-sm text-red-500 mt-2 flex items-center gap-1">
                    <span class="material-symbols-outlined text-sm">error</span>
                    Please enter a valid 10-digit phone number.
                </div>

                <div class="bg-primary/5 border border-primary/20 rounded-lg p-5">
                    <div class="flex items-start gap-4">
                        <input class="mt-1 w-5 h-5 rounded border-slate-300 text-primary" id="hipaa-consent"
                            type="checkbox" />
                        <label class="text-sm text-slate-500" for="hipaa-consent">
                            <span class="font-bold text-slate-900 dark:text-white block mb-1">HIPAA Consent & Email
                                Reminders</span>
                            I consent to receive appointment reminders and clinical communications.
                        </label>
                    </div>
                </div>

                <div class="flex items-center justify-between pt-6 border-t border-slate-200 dark:border-slate-800">
                    <button class="btn btn-secondary">
                        <span class="material-symbols-outlined">arrow_back</span>
                        Back
                    </button>
                    <button class="btn btn-primary px-10">
                        Continue
                        <span
                            class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
                    </button>
                </div>
            </form>
        </div>
    </main>

    <footer class="py-6 text-center text-slate-500 text-xs">
        © 2024 SmartBook Professional Scheduling. All rights reserved.
    </footer>

    <script src="../js/api.js"></script>
    <script src="../js/app.js"></script>
    <script>
        // Guard: Redirect if no reservation is found
        if (!sessionStorage.getItem('reservation')) {
            window.location.href = 'step_1_patient_status.html';
        }

        // Auto-fill form if data already exists in session
        const existingData = JSON.parse(sessionStorage.getItem('patientData'));
        if (existingData) {
            document.getElementById('fullName').value = existingData.fullName || '';
            document.getElementById('dob').value = existingData.dateOfBirth || '';
            document.getElementById('email').value = existingData.email || '';
            document.getElementById('phone').value = existingData.phone || '';
            document.getElementById('hipaa-consent').checked = existingData.hipaaConsent || false;
        }

        const form = document.querySelector('form');
        const phoneInput = document.getElementById('phone');
        const phoneValidationMsg = document.getElementById('phoneValidationMsg');

        // Phone number formatting
        phoneInput.addEventListener('input', function (e) {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,3})(\d{0,4})/);
            e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');

            if (e.target.value.length === 14) {
                phoneInput.classList.remove('border-red-500');
                phoneValidationMsg.classList.add('hidden');
            }
        });

        form.onsubmit = (e) => {
            e.preventDefault();

            const patientData = {
                fullName: document.getElementById('fullName').value,
                dateOfBirth: document.getElementById('dob').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                hipaaConsent: document.getElementById('hipaa-consent').checked
            };

            if (!patientData.hipaaConsent) {
                alert('Please accept the HIPAA consent to proceed.');
                return;
            }

            // Phone validation check before submit
            const phoneRegex = /^\(\d{3}\) \d{3}-\d{4}$/;
            if (!phoneRegex.test(patientData.phone)) {
                phoneInput.classList.add('border-red-500');
                phoneValidationMsg.classList.remove('hidden');
                phoneInput.focus();

                // Add a shake animation to the input
                phoneInput.classList.add('animate-[shake_0.5s_ease-in-out]');
                setTimeout(() => phoneInput.classList.remove('animate-[shake_0.5s_ease-in-out]'), 500);
                return;
            }

            sessionStorage.setItem('patientData', JSON.stringify(patientData));
            window.location.href = 'secure_deposit.html';
        };

        // Add Tailwind shake keyframes to head
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-5px); }
                75% { transform: translateX(5px); }
            }
        `;
        document.head.appendChild(style);

        document.querySelector('.btn-secondary').onclick = (e) => {
            e.preventDefault();
            window.location.href = 'step_4_date_time_selection.html';
        };
    </script>
</body>

</html>
