<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>SmartBook - Provider Selection</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../styles/globals.css">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#258cf4",
                    },
                },
            },
        }
    </script>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
    <header class="bg-primary px-6 py-4 flex items-center justify-between shadow-lg z-10">
        <div class="flex items-center gap-3">
            <div class="bg-white/20 p-2 rounded-lg">
                <span class="material-symbols-outlined text-white text-2xl">auto_awesome</span>
            </div>
            <h1 class="text-white text-xl font-bold tracking-tight">SmartBook</h1>
        </div>
        <div class="flex items-center gap-4">
            <span class="text-white/80 text-sm font-medium">Step 3 of 6</span>
            <div class="w-32 h-2 bg-white/20 rounded-full overflow-hidden">
                <div class="w-3/6 h-full bg-white rounded-full"></div>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-4xl mx-auto w-full px-6 py-12">
        <div class="mb-10 text-center md:text-left">
            <h1 class="text-3xl md:text-5xl font-black text-slate-900 dark:text-white mb-4 tracking-tight">
                Who would you like to see?
            </h1>
            <p class="text-lg text-slate-600 dark:text-slate-400 max-w-2xl">
                Showing providers qualified for <span class="text-primary font-semibold">Dermatology
                    Consultation</span>.
            </p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Recommended Card -->
            <button
                class="card group relative flex flex-col text-left p-6 border-primary ring-4 ring-primary/10 cursor-pointer overflow-hidden col-span-1 md:col-span-2">
                <div class="absolute top-0 right-0 p-4">
                    <span
                        class="bg-primary text-white text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-full">Recommended</span>
                </div>
                <div class="flex items-start gap-5">
                    <div class="size-14 rounded-full bg-primary flex items-center justify-center text-white shrink-0">
                        <span class="material-symbols-outlined text-3xl">bolt</span>
                    </div>
                    <div class="flex-1">
                        <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-1">Any Available Provider</h3>
                        <p class="text-slate-600 dark:text-slate-400 text-sm leading-relaxed">
                            The fastest way to get your appointment. We'll match you with the first expert available.
                        </p>
                    </div>
                    <div class="self-center">
                        <span class="material-symbols-outlined text-primary text-3xl">check_circle</span>
                    </div>
                </div>
            </button>

            <!-- Provider Profile 1 -->
            <button class="card group relative flex flex-col text-left p-6">
                <div class="flex gap-4 mb-4">
                    <div class="relative">
                        <img alt="Sarah Smith"
                            class="size-20 rounded-lg object-cover grayscale group-hover:grayscale-0 transition-all"
                            src="https://lh3.googleusercontent.com/aida-public/AB6AXuAaYD_2cCxpd-ZI31n9NT3GwgtDtFNbdj7bjZmd6zOKAkGBCTQLaL3qoln117TF2_WmqxW8gXhl7cAmzGS4ZACwLcV0ZloEwVYycxjhbdiam5XVpU225ly4T-KILvZWgHtKv8dTGL6QpDF085wVIPv3YEEe4rQ_jPPTrhPWtIkrbfGwLGzioI-qlUobIZ3EZ3iYaSN640EzK6G0e3RwOxJbhwRdNXw9ssRpyGEE05sDT72OH1cF3we0DEbB9qF8LWpz4rH9ZjW2OXB3" />
                        <div
                            class="absolute -bottom-2 -right-2 size-6 bg-green-500 border-4 border-surface-light dark:border-surface-dark rounded-full">
                        </div>
                    </div>
                    <div class="flex flex-col justify-center">
                        <h4 class="text-lg font-bold text-slate-900 dark:text-white">Dr. Sarah Smith</h4>
                        <p class="text-primary text-xs font-bold uppercase tracking-wider">Senior Specialist</p>
                    </div>
                </div>
                <div class="flex flex-wrap gap-2 mb-4">
                    <span
                        class="px-2 py-1 rounded bg-slate-100 dark:bg-slate-800 text-[10px] font-bold uppercase tracking-tighter text-slate-500 dark:text-slate-400">Medical</span>
                </div>
                <p class="text-xs text-slate-500 dark:text-slate-400 mt-auto flex items-center gap-1 font-medium">
                    <span class="material-symbols-outlined text-sm">calendar_today</span>
                    Next available: Tomorrow, 9:00 AM
                </p>
            </button>

            <!-- Provider Profile 2 -->
            <button class="card group relative flex flex-col text-left p-6">
                <div class="flex gap-4 mb-4">
                    <div class="relative">
                        <img alt="Michael Lee"
                            class="size-20 rounded-lg object-cover grayscale group-hover:grayscale-0 transition-all"
                            src="https://lh3.googleusercontent.com/aida-public/AB6AXuBxCnFPrs-nGfrDamT1OWBgjSOOZdIXd8bcOG6pZvpAhp7Rb6rFPliE5NiUx4zMPJXxyR-KoguAMn7ZvdFNkoT7EvLPnNHT2GJsx_7g_Sm_PimjZ8xZN733F8CKMIq9BZyMn3F5wsxq0ei0e08Gd4RRFTah26Cd2wH0Ss8YWYptkQn1sYyA0Q6N51yPrwzb-cCYcetHoenih_k46BFlpLWAPTlOdJdDJpQCZC2HbKL2j63RIPYoe2QjDTOxm7qTzTltkpvcLztrmQmr" />
                        <div
                            class="absolute -bottom-2 -right-2 size-6 bg-green-500 border-4 border-surface-light dark:border-surface-dark rounded-full">
                        </div>
                    </div>
                    <div class="flex flex-col justify-center">
                        <h4 class="text-lg font-bold text-slate-900 dark:text-white">Dr. Michael Lee</h4>
                        <p class="text-primary text-xs font-bold uppercase tracking-wider">Associate Director</p>
                    </div>
                </div>
                <div class="flex flex-wrap gap-2 mb-4">
                    <span
                        class="px-2 py-1 rounded bg-slate-100 dark:bg-slate-800 text-[10px] font-bold uppercase tracking-tighter text-slate-500 dark:text-slate-400">Cosmetic</span>
                    <span
                        class="px-2 py-1 rounded bg-slate-100 dark:bg-slate-800 text-[10px] font-bold uppercase tracking-tighter text-slate-500 dark:text-slate-400">Medical</span>
                </div>
                <p class="text-xs text-slate-500 dark:text-slate-400 mt-auto flex items-center gap-1 font-medium">
                    <span class="material-symbols-outlined text-sm">calendar_today</span>
                    Next available: Wed, 2:30 PM
                </p>
            </button>
        </div>
    </main>

    <footer
        class="mt-auto border-t border-slate-200 dark:border-slate-800 bg-white/5 backdrop-blur-xl px-6 py-6 sticky bottom-0">
        <div class="max-w-4xl mx-auto flex items-center justify-between gap-4">
            <button class="btn btn-secondary">
                <span class="material-symbols-outlined">arrow_back</span>
                Back
            </button>
            <button class="btn btn-primary px-10">
                Continue
                <span class="material-symbols-outlined">arrow_forward</span>
            </button>
        </div>
    </footer>

    <script src="../js/api.js"></script>
    <script src="../js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const clinicSlug = 'elite-med-spa';
            const selectedType = JSON.parse(sessionStorage.getItem('selectedAppointmentType'));

            if (selectedType) {
                document.querySelector('p.text-lg').innerHTML = `Showing providers qualified for <span class="text-primary font-semibold">${selectedType.name}</span>.`;
            }

            try {
                const response = await window.smartbookApi.getProviders(clinicSlug);
                if (response.success) {
                    renderProviders(response.data);
                }
            } catch (error) {
                console.error('Failed to fetch providers:', error);
            }
        });

        function renderProviders(providers) {
            const grid = document.querySelector('.grid');

            // Keep the "Any Available" card (the first grid item)
            const anyAvailableCard = grid.firstElementChild;
            grid.innerHTML = '';
            grid.appendChild(anyAvailableCard);

            anyAvailableCard.onclick = () => selectProvider({ id: 'any', full_name: 'Any Available Provider' });

            providers.forEach(provider => {
                const button = document.createElement('button');
                button.className = 'card group relative flex flex-col text-left p-6';
                button.onclick = () => selectProvider(provider);

                button.innerHTML = `
                    <div class="flex gap-4 mb-4">
                        <div class="relative">
                            <div class="size-20 rounded-lg bg-slate-200 dark:bg-slate-800 flex items-center justify-center">
                                <span class="material-symbols-outlined text-4xl text-slate-400">person</span>
                            </div>
                            <div class="absolute -bottom-2 -right-2 size-6 bg-green-500 border-4 border-white dark:border-slate-900 rounded-full"></div>
                        </div>
                        <div class="flex flex-col justify-center">
                            <h4 class="text-lg font-bold text-slate-900 dark:text-white">${provider.full_name}</h4>
                            <p class="text-primary text-xs font-bold uppercase tracking-wider">${provider.title || 'Provider'}</p>
                        </div>
                    </div>
                    <div class="flex flex-wrap gap-2 mb-4">
                        <span class="px-2 py-1 rounded bg-slate-100 dark:bg-slate-800 text-[10px] font-bold uppercase tracking-tighter text-slate-500 dark:text-slate-400">${provider.specialization || 'Specialist'}</span>
                    </div>
                    <p class="text-xs text-slate-500 dark:text-slate-400 mt-auto flex items-center gap-1 font-medium">
                        <span class="material-symbols-outlined text-sm">calendar_today</span>
                        Available this week
                    </p>
                `;
                grid.appendChild(button);
            });
        }

        function selectProvider(provider) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('border-primary', 'ring-4', 'ring-primary/10'));
            // Highlight logic...

            sessionStorage.setItem('selectedProvider', JSON.stringify(provider));
            console.log('Selected Provider:', provider.full_name);
        }

        document.querySelector('.btn-primary').onclick = () => {
            if (sessionStorage.getItem('selectedProvider')) {
                window.location.href = 'step_4_date_time_selection.html';
            } else {
                alert('Please select a provider.');
            }
        };

        document.querySelector('.btn-secondary').onclick = () => {
            window.location.href = 'step_2_treatment_selection.html';
        };
    </script>
</body>

</html>
